version: '3.9'

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: furnispace-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=furnispace_db;Username=furnispace;Password=${DB_PASSWORD}
      - Redis__ConnectionString=redis:6379
      - JwtSettings__SecretKey=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - furnispace-network

  postgres:
    image: postgres:16-alpine
    container_name: furnispace-postgres
    environment:
      POSTGRES_DB: furnispace_db
      POSTGRES_USER: furnispace
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U furnispace -d furnispace_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - furnispace-network

  redis:
    image: redis:7-alpine
    container_name: furnispace-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - furnispace-network

volumes:
  postgres_data:
  redis_data:

networks:
  furnispace-network:
    driver: bridge
